<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsivo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Music Legends</title>
</head>

<body>
    <main class="banner">
        <header class="header">
            <div class="container-links">
                <nav class="header-links">
                    <a href="#">Início</a>
                    <a href="#">Buscar</a>
                    <a href="#">Minha biblioteca</a>
                </nav>
                <p class="title">Music Legends</p>
                <div class="user">
                    <p>Maria</p>
                    <img class="intro-img" src="./src/img/avatar.png" alt="Avatar">
                </div>
            </div>
        </header>

        <section class="details">
            <div class="card-content">
                <h1 class="title-card">LEAGUE <span>OF</span> LEGENDS 1</h1>
                <p class="subtitle">Riot Games</p>

                <div class="controls-slider">
                    <button class="arrow-btn" aria-label="Anterior" title="Anterior">&lt;</button>
                    <span class="counter">1/20</span>
                    <button class="arrow-btn" aria-label="Próximo" title="Próximo">&gt;</button>
                </div>
            </div>
        </section>
    </main>


    <footer class="player-footer">
        <div class="music-progress">
            <div class="progress-fill"></div>
            <div class="progress-dot"></div>
        </div>
        
        <div class="footer-description">
            <div class="music-info">
                <i class="fa-solid fa-heart fa-2xl"></i>
                <div class="music-text">
                    <h4>Warriors</h4>
                    <p>IMAGINE DRAGONS</p>
                </div>
            </div>

            <div class="control">
                <i class="fa-solid fa-shuffle fa-lg"></i>
                <i class="fa-solid fa-backward-step  fa-lg"></i>
                <i class="fa-solid fa-play fa-lg circle-play"></i>
                <i class="fa-solid fa-forward-step fa-lg"></i>
                <i class="fa-solid fa-repeat fa-lg"></i>
            </div>

            <div class="extras">
                <i class="fa-solid fa-volume-high fa-lg"></i>
                <i class="fa-solid fa-up-right-and-down-left-from-center fa-lg"></i>
            </div>
        </div>
    </footer>

</body>

</html>
