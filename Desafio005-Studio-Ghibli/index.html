<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">
    <!--Icones-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <title>Studio Ghibli</title>
</head>

<body>
    <main class="container">
        <header>
            <img src="./src/image/logo.svg" alt="Logo Studio Ghibli" class="logo-studio">
            <nav class="nav-links">
                <a href="#" aria-label="Google"><img src="./src/image/logo-google.svg" alt="Google"></a>
                <a href="#" aria-label="Facebook"><img src="./src/image/logo-facebook.svg" alt="Facebook"></a>
                <a href="#" aria-label="Twitter"><img src="./src/image/logo-twitter.svg" alt="Twitter"></a>
                <a href="#" aria-label="Instagram"><img src="./src/image/logo-instagram.svg" alt="Instagram"></a>
            </nav>
        </header>

        <section class="conteudo">
            <article class="info-do-conteudo">
                <div class="descricao">
                    <div class="titulos">
                        <h4>HAYAO MIYAZAKI</h4>
                        <h1>A VIAGEM DE CHIHIRO</h1>
                    </div>
                    <p class="descricao-paragrafo">
                        Chihiro chega a um mundo mágico dominado por uma bruxa. Aqueles que a desobedecem são
                        transformados em animais.
                    </p>
                    <div class="buttons">
                        <a href="https://www.netflix.com/browse" role="button" class="button button-primary"
                            target="_blank" rel="noopener">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-caret-right" viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M6 12.796V3.204L11.481 8zm.659.753 5.48-4.796a1 1 0 0 0 0-1.506L6.66 2.451C6.011 1.885 5 2.345 5 3.204v9.592a1 1 0 0 0 1.659.753" />
                            </svg>
                            Assistir Agora
                        </a>

                        <a href="https://www.youtube.com/watch?v=SgZI655GgHk&t=16s" class="button button-ghost"
                            id="btn-spc" target="_blank" rel="noopener">ASSISTA O TRAILER</a>
                    </div>
                </div>
            </article>

            <figure class="ilustracao">
                <div class="chihiro-ghosts">
                    <img src="./src/image/fantasminha1.png" class="ghost-1"
                        alt="Ilustração do filme A Viagem de Chihiro">
                    <img src="./src/image/fantasminha2.png" class="ghost-2"
                        alt="Segundo fantasma do filme A Viagem de Chihiro">
                </div>
            </figure>
        </section>
    </main>

    <footer>
        <p>Desafio <a href="https://github.com/iuricode/desafios-frontend" target="_blank" rel="noopener">
                CodeLab </a>
            Desenvolvido por <a href="#"> Maria Romualdo </a></p>
    </footer>
</body>

</html>
