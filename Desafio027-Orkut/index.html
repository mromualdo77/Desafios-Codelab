<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orkut - Login</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">orkut</div>
        <nav>
            <a href="#">Sobre o Orkut</a>
            <a href="#">Centro de segurança</a>
        </nav>
    </header>

    <main class="container">
        <div class="banner">
            <div class="banner-content">
                <h1>Conecta-se aos seus amigos e familiares usando recados e mensagens instantâneas</h1>
            </div>
        </div>

        <div class="login-card">
            <div class="card-header">
                <div class="circle-logo"></div>
                <h2>Acesse o Orkut</h2>
            </div>

            <form>
                <input type="email" placeholder="E-mail" required>
                <input type="password" placeholder="Senha" required>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembrar minha senha</label>
                </div>

                <button type="submit" class="btn-primary">Entrar na conta</button>
                <button type="button" class="btn-secondary">Criar uma conta</button>
            </form>

            <a href="#" class="forgot-password">Esqueci a minha senha</a>
        </div>
    </main>

    <footer class="footer">
        Todos os direitos reservados
    </footer>

</body>

</html>
